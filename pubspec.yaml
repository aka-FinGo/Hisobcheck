name: hisobcheck
description: "Mebel sexi uchun moliyaviy ERP tizimi"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 1. Supabase (Baza)
  supabase_flutter: ^2.6.0

  # 2. Formatlash (Sana va Summa)
  intl: ^0.19.0

  # 3. Ikonkalar
  cupertino_icons: ^1.0.6
  font_awesome_flutter: ^10.7.0

  # 4. Grafiklar (Charts)
  fl_chart: ^0.66.0

  # 5. Sozlamalarni saqlash (Login, Tema)
  shared_preferences: ^2.2.3

  # 6. Tema boshqaruvi (ThemeProvider)
  provider: ^6.1.2

  # 7. Login UI paketi
  flutter_login: ^4.4.1

  # 8. Pastki navigatsiya
  google_nav_bar: ^5.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true